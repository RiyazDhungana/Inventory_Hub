<!doctype html>
<html>
  <head>
    <title>Low Stock Alerts</title>
  </head>
  <body>
    <h1>⚠ Low Stock Alerts</h1>

    {% if products %}
    <ul>
      {% for product in products %}
      <li>
        {{ product.name }} — {{ product.stock_quantity }} left (Min: {{
        product.minimum_stock }})
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p>✅ No low stock items.</p>
    {% endif %}
  </body>
</html>
