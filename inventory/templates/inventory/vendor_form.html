{% extends 'base.html' %}
{% block content %}
<div class="p-6 md:p-10 w-full max-w-5xl mx-auto overflow-x-hidden">
  <div class="mb-8">
    <a href="{% url 'vendor_list' %}" class="text-blue-600 hover:underline text-sm font-medium mb-4 inline-block">&larr; Back to Vendors</a>
    <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Add Vendor</h1>
    <p class="text-slate-500 mt-1">Register a new supplier to link to inventory purchases.</p>
  </div>

  <div class="bg-white rounded-xl shadow border border-slate-100 p-6 max-w-2xl">
    <form method="post" class="space-y-6">
      {% csrf_token %}
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Vendor Name</label>
        {{ form.name }}
        {{ form.name.errors }}
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contact Info</label>
        {{ form.contact_info }}
        {{ form.contact_info.errors }}
      </div>

      <div class="pt-4 flex gap-4">
        <button type="submit" class="px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 shadow">
          Save Vendor
        </button>
        <a href="{% url 'vendor_list' %}" class="px-6 py-2 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
