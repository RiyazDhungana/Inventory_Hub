{% extends 'base.html' %}

{% block content %}
<div class="p-6 md:p-10 w-full max-w-5xl mx-auto overflow-x-hidden">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Create Sale</h1>
    <p class="text-slate-500 mt-1">Record a new sales transaction.</p>
  </div>

    <div class="bg-white rounded-2xl shadow border border-slate-100 p-6">
      <form method="post" class="space-y-6">
        {% csrf_token %}

        {% if form_error %}
          <div class="p-3 rounded-lg bg-red-50 text-red-700 text-sm">
            ⚠ {{ form_error }}
          </div>
        {% endif %}

        <div id="line-items" class="space-y-4">
          <div class="line-item-row flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
              <label class="block text-sm font-medium text-slate-700 mb-1">Product</label>
              <select
                name="product"
                required
                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
              >
                <option value="" disabled selected>Select a product</option>
                {% for product in products %}
                  <option
                    value="{{ product.id }}"
                    {% if product.stock_quantity == 0 %}disabled{% endif %}
                  >
                    {{ product.name }} — Price: {{ product.selling_price }} | Stock: {{ product.stock_quantity }}
                    {% if product.stock_quantity == 0 %}(OUT OF STOCK){% endif %}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="w-full md:w-40">
              <label class="block text-sm font-medium text-slate-700 mb-1">Quantity</label>
              <input
                type="number"
                name="quantity"
                min="1"
                required
                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                placeholder="Qty"
              />
            </div>

            <button
              type="button"
              class="hidden md:inline-flex mt-6 px-3 py-2 rounded-lg border border-slate-300 text-xs font-medium text-slate-600 hover:bg-slate-50 transition"
              data-remove-row
            >
              Remove
            </button>
          </div>
        </div>

        <div class="pt-4 border-t border-slate-100">
          
          <div class="flex justify-end mb-4">
            <div class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 min-w-[200px] text-right">
              <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1">Gross Subtotal</span>
              <span class="text-xl font-bold text-slate-800" id="gross-subtotal-display">Rs 0.00</span>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Discount (%)</label>
              <input
                type="number"
                id="discount_percentage"
                min="0"
                max="100"
                step="0.01"
                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                placeholder="0.0"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Discount Amount (Rs)</label>
              <input
                type="number"
                name="discount_amount"
                id="discount_amount"
                min="0"
                step="0.01"
                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white"
                placeholder="0.00"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Authorized By (If Discount > 0)</label>
              <input
                type="text"
                name="discount_authorized_by"
                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                placeholder="Manager Name"
              />
            </div>
          </div>
        </div>

        <div>
          <button
            type="button"
            id="add-line-item"
            class="inline-flex items-center px-4 py-2.5 rounded-lg border border-dashed border-slate-300 text-sm font-medium text-slate-700 hover:bg-slate-50 transition"
          >
            + Add another product
          </button>
        </div>

        <div class="flex items-center justify-end gap-3">
          <a
            href="{% url 'sale_list' %}"
            class="px-4 py-2.5 rounded-lg border border-slate-300 text-sm font-medium text-slate-700 hover:bg-slate-50 transition"
          >
            Cancel
          </a>
          <button
            type="submit"
            class="px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold shadow-sm hover:shadow transition"
          >
            Submit Sale
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const container = document.getElementById("line-items");
    const addBtn = document.getElementById("add-line-item");
    const grossDisplay = document.getElementById("gross-subtotal-display");
    const pctInput = document.getElementById("discount_percentage");
    const amtInput = document.getElementById("discount_amount");

    function updateCalculations() {
      let gross = 0;
      const rows = container.getElementsByClassName("line-item-row");
      for (let row of rows) {
        const select = row.querySelector("select[name='product']");
        const qtyInput = row.querySelector("input[name='quantity']");
        
        if (select && select.value && qtyInput && qtyInput.value) {
          const option = select.options[select.selectedIndex];
          // Extact price from text: "Name — Price: 100.00 | Stock: 10"
          const text = option.text;
          const match = text.match(/Price:\s*([\d.]+)/);
          if (match && match[1]) {
             const price = parseFloat(match[1]);
             const qty = parseInt(qtyInput.value, 10);
             if (!isNaN(price) && !isNaN(qty)) {
                gross += price * qty;
             }
          }
        }
      }
      
      grossDisplay.textContent = `Rs ${gross.toFixed(2)}`;
      return gross;
    }

    // When percent changes, update amount
    pctInput.addEventListener("input", function() {
       const gross = updateCalculations();
       const pct = parseFloat(pctInput.value) || 0;
       if (gross > 0) {
           const amt = (gross * (pct / 100)).toFixed(2);
           amtInput.value = amt;
       } else {
           amtInput.value = "";
       }
    });

    // When amount changes, update percent (purely visual)
    amtInput.addEventListener("input", function() {
       const gross = updateCalculations();
       const amt = parseFloat(amtInput.value) || 0;
       if (gross > 0) {
           const pct = ((amt / gross) * 100).toFixed(2);
           pctInput.value = pct;
       } else {
           pctInput.value = "";
       }
    });

    // Listen for changes on the form to update live totals
    container.addEventListener("input", function(e) {
       const gross = updateCalculations();
       // Re-apply percent if it exists
       if (pctInput.value) {
           const pct = parseFloat(pctInput.value) || 0;
           amtInput.value = (gross * (pct / 100)).toFixed(2);
       }
    });

    if (!container || !addBtn) return;

    addBtn.addEventListener("click", function () {
      const rows = container.getElementsByClassName("line-item-row");
      if (!rows.length) return;

      const firstRow = rows[0];
      const newRow = firstRow.cloneNode(true);

      // Reset values
      const selects = newRow.getElementsByTagName("select");
      const inputs = newRow.getElementsByTagName("input");
      if (selects.length) {
        selects[0].selectedIndex = 0;
      }
      if (inputs.length) {
        inputs[0].value = "";
      }

      // Show remove button on cloned rows
      const removeBtn = newRow.querySelector("[data-remove-row]");
      if (removeBtn) {
        removeBtn.classList.remove("hidden");
      }

      container.appendChild(newRow);
      updateCalculations();
    });

    container.addEventListener("click", function (e) {
      if (e.target && e.target.hasAttribute("data-remove-row")) {
        const rows = container.getElementsByClassName("line-item-row");
        if (rows.length <= 1) return; // keep at least one row
        const row = e.target.closest(".line-item-row");
        if (row) {
          container.removeChild(row);
          updateCalculations();
          
          // trigger pct recalculation
          if (pctInput.value) {
            pctInput.dispatchEvent(new Event('input'));
          }
        }
      }
    });
    
    // Initial Calc
    updateCalculations();
  });
</script>
{% endblock %}
